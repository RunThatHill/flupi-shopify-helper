# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "55652b8c8cdc2e313dbef4a186d4031d"
application_url = "https://flupi-shopify-helper-production.up.railway.app"
embedded = true
name = "Favo Sync"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers, write_customers, read_orders, write_orders, read_fulfillments, write_fulfillments, read_merchant_managed_fulfillment_orders, write_merchant_managed_fulfillment_orders, read_assigned_fulfillment_orders, write_assigned_fulfillment_orders, read_inventory, read_products"

[auth]
redirect_urls = [
  "https://flupi-shopify-helper-production.up.railway.app/auth/callback",
  "https://flupi-shopify-helper-production.up.railway.app/api/auth"
]

[build]
automatically_update_urls_on_dev = true
